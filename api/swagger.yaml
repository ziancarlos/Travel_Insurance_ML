openapi: 3.0.3
info:
  title: Travel Insurance Fraud Prediction API
  description: API for creating and retrieving travel insurance claim predictions
  version: "1.0.0"

servers:
  - url: /api
    description: Base API path

security:
  - AuthorizationHeader: []

tags:
  - name: Predictions
    description: Endpoints for creating and fetching predictions

paths:
  /predicts:
    get:
      tags:
        - Predictions
      summary: Get all predictions
      description: Fetch a list of all previously created predictions
      operationId: getPredictions
      responses:
        "200":
          description: Successfully fetched predictions
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Successfully fetched predictions"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PredictionResponse"

    post:
      tags:
        - Predictions
      summary: Create a new prediction
      description: Submit travel insurance data to generate a fraud prediction
      operationId: createPrediction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePredictionRequest"
      responses:
        "200":
          description: Successfully created a prediction
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Succcessfully Created A Predictions"
                  data:
                    $ref: "#/components/schemas/PredictionResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

components:
  securitySchemes:
    AuthorizationHeader:
      type: apiKey
      in: header
      name: Authorization
      description: >
        Pass the raw token directly in the Authorization header
        (no "Bearer " prefix), e.g. Authorization: <your-token>

  schemas:
    AgencyType:
      type: string
      enum:
        - C2B
        - EPX
        - JZI
        - CWT
        - LWC
        - ART
        - CSR
        - SSI
        - RAB
        - KML
        - TST
        - TTW
        - JWT
        - ADM
        - CCR
        - CBH

    AgencyCategory:
      type: string
      enum:
        - Airlines
        - Travel Agency

    Channel:
      type: string
      enum:
        - Online
        - Offline

    ProductName:
      type: string
      enum:
        - Annual Silver Plan
        - Cancellation Plan
        - Basic Plan
        - 2 way Comprehensive Plan
        - Bronze Plan
        - 1 way Comprehensive Plan
        - Rental Vehicle Excess Insurance
        - Single Trip Travel Protect Gold
        - Silver Plan
        - Value Plan
        - 24 Protect
        - Annual Travel Protect Gold
        - Comprehensive Plan
        - Ticket Protector
        - Travel Cruise Protect
        - Single Trip Travel Protect Silver
        - Individual Comprehensive Plan
        - Gold Plan
        - Annual Gold Plan
        - Child Comprehensive Plan
        - Premier Plan
        - Annual Travel Protect Silver
        - Single Trip Travel Protect Platinum
        - Annual Travel Protect Platinum
        - Spouse or Parents Comprehensive Plan
        - Travel Cruise Protect Family

