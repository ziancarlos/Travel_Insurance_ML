    YesNo:
      type: string
      enum:
        - "Yes"
        - "No"

    CreatePredictionRequest:
      type: object
      required:
        - agency
        - agency_type
        - distribution_channel
        - product_name
        - destination
        - duration
        - net_sales
        - commission
        - age
      properties:
        agency:
          $ref: "#/components/schemas/AgencyType"
        agency_type:
          $ref: "#/components/schemas/AgencyCategory"
        distribution_channel:
          $ref: "#/components/schemas/Channel"
        product_name:
          $ref: "#/components/schemas/ProductName"
        destination:
          $ref: "#/components/schemas/Destination"
        duration:
          type: integer
          minimum: 1
          exclusiveMinimum: false
          description: Durasi perjalanan dalam hari
          example: 7
        net_sales:
          type: number
          format: float
          description: Nilai penjualan bersih (bisa negatif jika refund)
          example: 39.6
        commission:
          type: number
          format: float
          minimum: 0
          description: Nilai komisi (minimal 0)
          example: 9.9
        age:
          type: integer
          minimum: 0
          maximum: 120
          description: Usia penumpang
          example: 35
      example:
        agency: "C2B"
        agency_type: "Airlines"
        distribution_channel: "Online"
        product_name: "Basic Plan"
        destination: "SINGAPORE"
        duration: 7
        net_sales: 39.6
        commission: 9.9
        age: 35

    PredictionResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        prediction_class:
          type: string
          description: Predicted classification label
          example: "Not Fraud"
        prediction_probability:
          type: number
          format: float
          description: Model confidence score for the predicted class
          example: 0.87
        agency:
          $ref: "#/components/schemas/AgencyType"
        agency_type:
          $ref: "#/components/schemas/AgencyCategory"
        distribution_channel:
          $ref: "#/components/schemas/Channel"
        product_name:
          $ref: "#/components/schemas/ProductName"
        destination:
          $ref: "#/components/schemas/Destination"
        duration:
          type: integer
          example: 7
        net_sales:
          type: number
          format: float
          example: 39.6
        commission:
          type: number
          format: float
          example: 9.9
        age:
          type: integer
          example: 35
        is_refund:
          $ref: "#/components/schemas/YesNo"
        suspected_fraud:
          $ref: "#/components/schemas/YesNo"
        commission_rate:
          type: number
          format: float
          example: 0.25
        model_version:
          type: string
          description: Only present on GET /predicts responses
          example: "v1.0.0"
        created_at:
          type: string
          format: date-time
          description: Only present on GET /predicts responses
          example: "2026-07-23T10:15:00Z"

    ValidationError:
      type: object
      properties:
        message:
          type: string
          example: "Validation failed"
        errors:
          type: array
          items:
            type: object
            properties:
              loc:
                type: array
                items:
                  type: string
              msg:
                type: string
              type:
                type: string